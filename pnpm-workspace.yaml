packages:
  - "apps/*"
  - "packages/*"
  - "modules/*"

strictDepBuilds: false
verifyDepsBeforeRun: false
nodeLinker: hoisted
confirmModulesPurge: false

onlyBuiltDependencies:
  - "@prisma/client"
  - "@prisma/engines"
  - "esbuild"
  - "msgpackr-extract"
  - "prisma"
  - "sharp"

allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  esbuild: true
  msgpackr-extract: true
  prisma: true
  sharp: true
